# Install RabbitMQ Cluster Operator
# kubectl apply -f "https://github.com/rabbitmq/cluster-operator/releases/latest/download/cluster-operator.yml"

# RabbitMQ Cluster Instance
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 3
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: stable
            operator: In
            values:
            - rabbit
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                - rabbitmq
          topologyKey: "kubernetes.io/hostname"
  tolerations:
  - key: stable
    operator: Equal
    value: rabbit
    effect: NoSchedule
  service:
    type: ClusterIP
  persistence:
    storageClassName: "standard-rwo"  # Use default storage class
    storage: 3Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi
  rabbitmq:
    additionalConfig: |
      management.tcp.port = 15672
      management.tcp.ip = 0.0.0.0
      log.console.level = info
    envConfig: |
      RABBITMQ_DEFAULT_USER=guest
      RABBITMQ_DEFAULT_PASS=guest
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: password-exchange-reminder
  namespace: default
  labels:
    app: password-exchange
    component: reminder
spec:
  # Run daily at 9:00 AM UTC
  schedule: "*/10 * * * *"
  # Alternatively, run every 24 hours from first execution: "@every 24h"
  concurrencyPolicy: Forbid  # Don't allow overlapping jobs
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1
  startingDeadlineSeconds: 300  # Job must start within 5 minutes of scheduled time
  jobTemplate:
    spec:
      # Clean up completed jobs after 6 hours
      ttlSecondsAfterFinished: 21600
      template:
        metadata:
          annotations:
            linkerd.io/inject: enabled
            proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
          labels:
            app: password-exchange
            component: reminder
        spec:
          restartPolicy: OnFailure
          containers:
          - name: reminder
            image: ghcr.io/anthony-bible/passwordexchange-container-dev@sha256:460f65bb1fb47220288deafc59352a4fa67fd05b4fb24be8010996017994a858
            imagePullPolicy: Always
            command: ["/app/app"]
            args: ["reminder", "--config=/config/config.yaml"]
            envFrom:
              - secretRef:
                  name: test-secret
            env:
            # Database configuration
            # Reminder configuration
            - name: PASSWORDEXCHANGE_REMINDER_ENABLED
              value: "true"
            - name: PASSWORDEXCHANGE_REMINDER_CHECKAFTERHOURS
              value: "24"
            - name: PASSWORDEXCHANGE_REMINDER_MAXREMINDERS
              value: "3"
            - name: PASSWORDEXCHANGE_REMINDER_INTERVAL
              value: "24"
            # Logging
            - name: PASSWORDEXCHANGE_LOGLEVEL
              value: "info"
            volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
          volumes:
          - name: config
            configMap:
              name: password-exchange-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: password-exchange-config
  namespace: default
  labels:
    app: password-exchange
data:
  config.yaml: |
    # Minimal config for reminder service
    loglevel: info
    reminder:
      enabled: true
      checkafterhours: 24
      maxreminders: 3
      reminderinterval: 24

